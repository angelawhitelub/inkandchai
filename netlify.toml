[build]
  publish   = "public"
  functions = "netlify/functions"
  command   = "python3 generate_site.py"

[build.environment]
  NODE_VERSION = "20"

# Redirect all non-file requests to index (SPA-style)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=()"

# Cache images aggressively, HTML never
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
