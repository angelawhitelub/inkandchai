[build]
  publish   = "public"
  functions = "netlify/functions"
  command   = "npm install && python3 generate_site.py"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = ["data/ALL_BOOKS.json"]

# Abandoned cart recovery — runs every hour automatically
[functions."auto-recover-carts"]
  schedule = "@hourly"

# Static assets — never redirect
[[redirects]]
  from   = "/images/*"
  to     = "/images/:splat"
  status = 200
  force  = false

[[redirects]]
  from   = "/js/*"
  to     = "/js/:splat"
  status = 200
  force  = false

# Pretty collection/category URLs, e.g. /category/hindi-books/
[[redirects]]
  from   = "/category/*"
  to     = "/category/index.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/collection/*"
  to     = "/collection/index.html"
  status = 200
  force  = false

# Merchant Center was given this older mixed-case generated URL. Keep it
# permanently available and point crawlers to the current canonical product URL.
[[redirects]]
  from   = "/product/david-goggins-combo-hindi-can-t-hurt-me-never-finished--BO-HI/"
  to     = "/product/david-goggins-combo-hindi-cant-hurt-me-never-finished/"
  status = 301
  force  = true

[[redirects]]
  from   = "/product/david-goggins-combo-hindi-can-t-hurt-me-never-finished--bo-hi/"
  to     = "/product/david-goggins-combo-hindi-cant-hurt-me-never-finished/"
  status = 301
  force  = true

# Removed product listing. Return a real 404 instead of falling through to the
# homepage catch-all so old links and crawlers stop treating it as available.
[[redirects]]
  from   = "/product/we-are-there-for-each-other-hindi-edition-by-sagar-chud-RE-HI/"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/product/we-are-there-for-each-other-hindi-edition-by-sagar-chud-re-hi/"
  to     = "/404.html"
  status = 404
  force  = true

# Dynamic admin-created product pages. Existing generated product files still
# win first because this redirect is not forced.
[[redirects]]
  from   = "/product/*"
  to     = "/.netlify/functions/product-page?slug=:splat"
  status = 200
  force  = false

# Redirect all non-file requests to index (SPA-style)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=()"

# Cache headers are managed by public/_headers — that file uses Netlify's
# native syntax which has reliable glob matching across subfolders. The TOML
# [[headers]] rules below ONLY had path-matching bugs (e.g. for="/index.html"
# missed /product/index.html etc.) and are intentionally omitted here.
